<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>상권유형 재분류 도구</title>
<style>
  body{font-family:'Malgun Gothic',sans-serif;background:#f5f7fa;margin:0;padding:20px;color:#1e293b}
  h1{font-size:18px;color:#1F3864;margin-bottom:4px}
  .sub{font-size:12px;color:#64748b;margin-bottom:16px}
  .status{background:#fff;border:1px solid #dde3ec;border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:13px}
  .status b{color:#1a5c35}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);font-size:12px}
  th,td{padding:7px 9px;text-align:left;border-bottom:1px solid #eef1f5}
  th{background:#1F3864;color:#fff;font-weight:700;position:sticky;top:0}
  tr:nth-child(even){background:#fafbfc}
  .changed{background:#fff7ed}
  button{background:#1a5c35;color:#fff;border:none;border-radius:6px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;margin-right:8px;margin-top:10px}
  button:hover{background:#164a2b}
  #out{width:100%;height:260px;margin-top:14px;font-family:monospace;font-size:11px;padding:10px;border:1px solid #dde3ec;border-radius:8px}
</style>
</head>
<body>
<h1>🏷️ 상권유형 위치기반 재분류 도구</h1>
<div class="sub">29개 매장 주소를 기준으로 반경 300m 내 지하철역〉대학교〉관공서〉의료기관 순으로 상권유형을 자동 분류합니다.</div>
<div class="status" id="status">대기 중...</div>
<button id="btnCopy" style="display:none">결과 복사 (STORES 병합용)</button>
<table id="tbl">
<thead><tr><th>점포명</th><th>주소</th><th>기존 상권유형</th><th>새 상권유형</th><th>분류 근거</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
<textarea id="out" placeholder="결과가 여기 표시됩니다..." readonly></textarea>

<script>
var STORES_ADDR = [{"storesName": "신도림점", "addr": "서울 구로구 새말로 93 신도림 태영타운", "oldAtype": "오피스·관공서"}, {"storesName": "구미점", "addr": "경북 구미시 송정대로 48", "oldAtype": "오피스·관공서"}, {"storesName": "증미역점", "addr": "서울시 강서구 양천로 564", "oldAtype": "역세권"}, {"storesName": "수원역로데오점", "addr": "경기도 수원시 팔달구 덕영대로 905", "oldAtype": "역세권"}, {"storesName": "수원성균관대점", "addr": "경기도 수원시 장안구 서부로 2106번길 14", "oldAtype": "오피스·관공서"}, {"storesName": "서초법원점", "addr": "서울특별시 서초구 서초중앙로 147", "oldAtype": "역세권"}, {"storesName": "굴포천역점", "addr": "인천 부평구 길주로 623", "oldAtype": "역세권"}, {"storesName": "김포통진마송점", "addr": "경기도 김포시 통진읍 조강로36번길", "oldAtype": "병원상권"}, {"storesName": "검암점", "addr": "인천 서구 검암로30번길", "oldAtype": "병원상권"}, {"storesName": "한밭대점", "addr": "대전 유성구 학하서로121번길 71-26", "oldAtype": "일반상권"}, {"storesName": "고양법원점", "addr": "경기 고양시 일산동구 장백로 194", "oldAtype": "역세권"}, {"storesName": "완주봉동점", "addr": "전북 완주군 봉동읍 봉동로 151", "oldAtype": "오피스·관공서"}, {"storesName": "포항문덕점", "addr": "경북 포항시 남구 오천읍 원동로 32", "oldAtype": "병원상권"}, {"storesName": "의정부금오점", "addr": "경기도 의정부시 부용로 105", "oldAtype": "역세권"}, {"storesName": "강남구청점", "addr": "서울 강남구 학동로 343", "oldAtype": "역세권"}, {"storesName": "안양시청점", "addr": "경기 안양시 동안구 시민대로 230", "oldAtype": "오피스·관공서"}, {"storesName": "상주북천교점", "addr": "경북 상주시 경상대로 3144", "oldAtype": "오피스·관공서"}, {"storesName": "부호역점", "addr": "경북 경산시 하양읍 대경로105길 10", "oldAtype": "역세권"}, {"storesName": "아산선문대점", "addr": "충남 아산시 탕정면 탕정면로 114-1", "oldAtype": "일반상권"}, {"storesName": "울산법원점", "addr": "울산 남구 법대로 94-1", "oldAtype": "병원상권"}, {"storesName": "강원대병원점", "addr": "강원도 춘천시 성심로 100", "oldAtype": "오피스·관공서"}, {"storesName": "남동인더스파크공단역점", "addr": "인천시 남동구 은청로 16-17", "oldAtype": "역세권"}, {"storesName": "구미인동점", "addr": "경북 구미시 인동26길 14-2", "oldAtype": "오피스·관공서"}, {"storesName": "안산대학교점", "addr": "안산시 상록구 안산대학로 158", "oldAtype": "일반상권"}, {"storesName": "춘천시청점", "addr": "강원도 춘천시 시청길 10번길 4-2", "oldAtype": "오피스·관공서"}, {"storesName": "울산장검점", "addr": "울산 울주군 범서읍 장검1길 57", "oldAtype": "병원상권"}, {"storesName": "대구시청점", "addr": "대구 중구 국채보상로 659", "oldAtype": "오피스·관공서"}, {"storesName": "천안병천순대거리점", "addr": "충남 천안시 동남구 병천면 아우내순대길", "oldAtype": "오피스·관공서"}, {"storesName": "부천법원점", "addr": "경기 부천시 원미구 상일로 130", "oldAtype": "오피스·관공서"}];
var results = [];
var doneCount = 0;
var map=null, geocoder=null, ps=null;

function render(){
  var tbody = document.getElementById('tbody');
  tbody.innerHTML = STORES_ADDR.map(function(s,i){
    var r = results[i];
    if(!r) return '<tr><td>'+s.storesName+'</td><td>'+s.addr+'</td><td>'+s.oldAtype+'</td><td colspan="2">분석 중...</td></tr>';
    var changed = r.atype !== s.oldAtype;
    return '<tr class="'+(changed?'changed':'')+'">'+
      '<td>'+s.storesName+'</td><td>'+s.addr+'</td>'+
      '<td>'+s.oldAtype+'</td>'+
      '<td style="font-weight:700;color:'+(changed?'#d97706':'#166534')+'">'+r.atype+(changed?' (변경)':'')+'</td>'+
      '<td>'+r.reason+'</td>'+
      '</tr>';
  }).join('');
  document.getElementById('status').innerHTML = '<b>'+doneCount+' / '+STORES_ADDR.length+'</b> 건 분석 완료';
  if(doneCount>=STORES_ADDR.length){
    document.getElementById('status').innerHTML += ' — 완료!';
    document.getElementById('btnCopy').style.display='inline-block';
  }
}

function classifyAtype(sig){
  if(sig.subway!=null&&sig.subway<=300){
    return{atype:'역세권',reason:(sig.subwayName||'지하철역')+' '+sig.subway+'m 이내'};
  }
  if(sig.university){
    return{atype:'대학가',reason:sig.university.name+' '+sig.university.dist+'m 이내'};
  }
  if(sig.govoffice){
    return{atype:'오피스·관공서',reason:sig.govoffice.name+' '+sig.govoffice.dist+'m 이내'};
  }
  if(sig.hospital){
    return{atype:'병원상권',reason:sig.hospital.name+' '+sig.hospital.dist+'m 이내'};
  }
  return{atype:'일반상권',reason:'지하철역 300m·대학교 500m·관공서 300m·종합병원 300m 이내 모두 해당없음'};
}

function collectOne(i,cb){
  var s = STORES_ADDR[i];
  geocoder.addressSearch(s.addr, function(res,status){
    if(status!==kakao.maps.services.Status.OK || !res[0]){
      results[i]={atype:'실패',reason:'주소검색실패'}; doneCount++; render(); cb(); return;
    }
    var loc = new kakao.maps.LatLng(parseFloat(res[0].y), parseFloat(res[0].x));
    var subway=null,subwayName=null,university=null,govoffice=null,hospital=null;
    var tasks=4, done=0;
    function checkDone(){
      done++;
      if(done>=tasks){
        var info=classifyAtype({subway:subway,subwayName:subwayName,university:university,govoffice:govoffice,hospital:hospital});
        results[i]=info;
        doneCount++; render(); cb();
      }
    }
    ps.categorySearch('SW8',function(data,status2){
      if(status2===kakao.maps.services.Status.OK&&data.length>0){subway=Math.round(data[0].distance);subwayName=data[0].place_name;}
      checkDone();
    },{location:loc,radius:500,size:3});
    ps.categorySearch('SC4',function(data,status2){
      if(status2===kakao.maps.services.Status.OK){
        data.forEach(function(p){
          if(!/대학/.test(p.place_name)&&!/대학/.test(p.category_name||''))return;
          var d=Math.round(p.distance);
          if(d<=500&&(!university||d<university.dist)) university={name:p.place_name,dist:d};
        });
      }
      checkDone();
    },{location:loc,radius:500,size:15});
    ps.categorySearch('PO3',function(data,status2){
      if(status2===kakao.maps.services.Status.OK&&data.length>0){
        var d=Math.round(data[0].distance);
        if(d<=300) govoffice={name:data[0].place_name,dist:d};
      }
      checkDone();
    },{location:loc,radius:300,size:5});
    ps.categorySearch('HP8',function(data,status2){
      if(status2===kakao.maps.services.Status.OK){
        data.forEach(function(p){
          if(!/종합병원/.test(p.place_name)&&!/종합병원/.test(p.category_name||''))return;
          var d=Math.round(p.distance);
          if(d<=300&&(!hospital||d<hospital.dist)) hospital={name:p.place_name,dist:d};
        });
      }
      checkDone();
    },{location:loc,radius:300,size:15});
  });
}

function run(){
  var idx=0;
  function next(){
    if(idx>=STORES_ADDR.length)return;
    var cur=idx; idx++;
    collectOne(cur,function(){ setTimeout(next,150); });
  }
  next();
}

function initKakao(){
  geocoder = new kakao.maps.services.Geocoder();
  ps = new kakao.maps.services.Places();
  document.getElementById('status').textContent = '분석 시작...';
  render();
  run();
}

document.getElementById('btnCopy').onclick=function(){
  var lines = STORES_ADDR.map(function(s,i){
    var r = results[i]||{};
    if(!r.atype||r.atype==='실패') return "  // "+s.storesName+" 분석 실패";
    return "  '"+s.storesName+"': {atype:'"+r.atype+"',atypeReason:'"+(r.reason||'').replace(/'/g,'')+"'},";
  }).join('\n');
  var text = '{\n'+lines+'\n}';
  document.getElementById('out').value = text;
  document.getElementById('out').select();
  document.execCommand('copy');
  alert('복사되었습니다.');
};
</script>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=475ab6f89af7dc6ded8449065d23061c&libraries=services&autoload=false"></script>
<script>kakao.maps.load(initKakao);</script>
</body>
</html>
